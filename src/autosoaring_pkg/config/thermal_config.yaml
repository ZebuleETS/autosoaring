# Simulation Boundaries (ENU meters, matching dronePx4 params)
# Thermals are generated directly in this coordinate space
# Zone centrée autour du home (0,0) en ENU
x_lower_bound: -3000.0
x_upper_bound: 3000.0
y_lower_bound: -3000.0
y_upper_bound: 3000.0

# Thermal Generation Configuration
n_thermals_range: [10, 15]
min_distance_between_thermals: 200.0
zi_range: [1250.0, 2000]  # Convective boundary layer height (m)
w_star_range: [2.0,5.0]   # Updraft strength (m/s)
lifespan_range: [1200000.0, 1800000.0]

# Algorithm-relevant thermal parameters (derived from zi/wi for dronePx4 integration)
radius_factor: 0.1            # radius = zi * radius_factor (Allen model approximation)
min_thermal_radius: 100.0     # minimum algorithm radius (meters)
max_thermal_radius: 300.0     # maximum algorithm radius (meters)

# Thermal Detection Configuration
target_altitude: 600.0  # Target altitude for thermal exploitation
orbit_radius: 40.0  # Orbit radius in meters
max_centering_iterations: 10  # Maximum centering iterations
climb_rate_diff_threshold: 0.5  # Stop centering if max climb rate difference is less than this 
